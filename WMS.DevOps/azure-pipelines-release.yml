trigger: none

resources:
  pipelines:
    - pipeline: CI
      source: 'WMS-CI'
      trigger:
        branches:
          include:
            - main

variables:
  azureSubscription: 'azure-service-connection'

  apiAppName: 'wms-project'

  frontendAppName: 'wms-frontend'

stages:

# =========================================================
# DEPLOY BACKEND
# =========================================================
- stage: DeployBackend
  displayName: 'Deploy API to Azure App Service'

  jobs:

    - deployment: DeployAPI
      displayName: 'Deploy Backend'

      environment: 'production'

      strategy:
        runOnce:
          deploy:
            steps:

              # DOWNLOAD ARTIFACTS
              - download: CI
                artifact: drop

              # DEPLOY BACKEND
              - task: AzureWebApp@1
                displayName: 'Deploy API to App Service'

                inputs:
                  azureSubscription: '$(azureSubscription)'
                  appName: '$(apiAppName)'
                  package: '$(Pipeline.Workspace)/CI/drop/backend'

# =========================================================
# DEPLOY FRONTEND
# =========================================================
- stage: DeployFrontend
  displayName: 'Deploy Frontend'
  dependsOn: DeployBackend
  condition: succeeded()

  jobs:

    - deployment: DeployFrontend
      displayName: 'Deploy Frontend'

      environment: 'production'

      strategy:
        runOnce:
          deploy:
            steps:

              # DOWNLOAD ARTIFACTS
              - download: CI
                artifact: drop

              # DEPLOY ANGULAR FRONTEND
              - task: AzureWebApp@1
                displayName: 'Deploy Frontend to Azure App Service'

                inputs:
                  azureSubscription: '$(azureSubscription)'
                  appName: '$(frontendAppName)'
                  package: '$(Pipeline.Workspace)/CI/drop/frontend'