trigger: none

resources:
  pipelines:
    - pipeline: CI
      source: 'WMS-CI'
      trigger:
        branches:
          include:
            - main

variables:
  azureSubscription: 'azure-service-connection'
  apiAppName: 'WMS-Project'
  frontendAppName: 'WMS-Frontend'

stages:

# =========================================================
# BACKEND DEPLOYMENT (uses CI artifact)
# =========================================================
- stage: DeployBackend
  displayName: 'Deploy API to Azure App Service'

  jobs:
    - deployment: DeployAPI
      displayName: 'Deploy Backend'
      environment: 'production'
      strategy:
        runOnce:
          deploy:
            steps:
              - download: CI
                artifact: drop

              - task: AzureWebApp@1
                displayName: 'Deploy API to App Service'
                inputs:
                  azureSubscription: '$(azureSubscription)'
                  appName: '$(apiAppName)'
                  package: '$(Pipeline.Workspace)/CI/drop/backend'

# =========================================================
# FRONTEND DEPLOYMENT (build + deploy directly)
# =========================================================
- stage: DeployFrontend
  displayName: 'Deploy Angular to Static Web Apps'
  dependsOn: DeployBackend
  condition: succeeded()

  jobs:
    - job: DeployFrontend
      displayName: 'Build and Deploy Frontend'
      steps:
        - checkout: self

        - task: AzureStaticWebApp@0
          displayName: 'Build & Deploy Angular to Static Web App'
          inputs:
            app_location: 'frontend'
            output_location: 'dist/WMS_Frontend_Project/browser'
            azure_static_web_apps_api_token: $(SWA_TOKEN)
