<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-icon class="login-icon">warehouse</mat-icon>
      <mat-card-title>WMS Login</mat-card-title>
      <mat-card-subtitle>Workforce Management System</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" placeholder="Enter username" autocomplete="username">
          <mat-icon matPrefix>person</mat-icon>
          <mat-error *ngIf="loginForm.controls.username.hasError('required')">Username is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Enter password" autocomplete="current-password">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.controls.password.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="loginForm.controls.password.hasError('minlength')">Minimum 6 characters</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width" type="submit" [disabled]="loginForm.invalid || loading">
          <mat-icon *ngIf="loading" class="spin">hourglass_top</mat-icon>
          <span *ngIf="!loading">Sign In</span>
          <span *ngIf="loading">Signing in...</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
