<div class="page-header">
  <h1>Departments</h1>
  <button mat-raised-button color="primary" routerLink="/departments/new" *ngIf="isAdmin">
    <mat-icon>add</mat-icon> Add Department
  </button>
</div>

<div class="table-container mat-elevation-z1">
  <mat-table [dataSource]="departments">
    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef> Name </mat-header-cell>
      <mat-cell *matCellDef="let dept"> {{ dept.name }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="description">
      <mat-header-cell *matHeaderCellDef> Description </mat-header-cell>
      <mat-cell *matCellDef="let dept"> {{ dept.description || '-' }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="employeeCount">
      <mat-header-cell *matHeaderCellDef> Employees </mat-header-cell>
      <mat-cell *matCellDef="let dept"> {{ dept.employeeCount }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
      <mat-cell *matCellDef="let dept">
        <button mat-icon-button color="primary" [routerLink]="['/departments', dept.departmentId, 'edit']" *ngIf="isAdmin" matTooltip="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="onDelete(dept.departmentId, dept.name)" *ngIf="isAdmin" matTooltip="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
  </mat-table>
</div>
