<div class="page-header">
  <h1>My Projects</h1>
</div>

<mat-card class="table-container mat-elevation-z1">
  <mat-table [dataSource]="allocations" *ngIf="!loading">
    <ng-container matColumnDef="projectName">
      <mat-header-cell *matHeaderCellDef> Project </mat-header-cell>
      <mat-cell *matCellDef="let a"> {{ a.projectName }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="roleOnProject">
      <mat-header-cell *matHeaderCellDef> Role </mat-header-cell>
      <mat-cell *matCellDef="let a"> {{ a.roleOnProject || '-' }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="allocatedAt">
      <mat-header-cell *matHeaderCellDef> Allocated At </mat-header-cell>
      <mat-cell *matCellDef="let a"> {{ a.allocatedAt | date:'mediumDate' }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
      <mat-cell *matCellDef="let a">
        <button mat-icon-button color="primary" [routerLink]="['/projects', a.projectId]" matTooltip="View Project">
          <mat-icon>visibility</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
  </mat-table>

  <p *ngIf="!loading && allocations.length === 0" class="no-data">You are not allocated to any projects yet.</p>
</mat-card>
