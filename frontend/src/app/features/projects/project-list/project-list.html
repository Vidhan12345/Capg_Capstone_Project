<div class="page-header">
  <h1>Projects</h1>
  <button mat-raised-button color="primary" routerLink="/projects/new" *ngIf="isManager">
    <mat-icon>add</mat-icon> Add Project
  </button>
</div>

<div class="table-container mat-elevation-z1">
  <mat-table [dataSource]="dataSource" matSort (matSortChange)="loadProjects()">
    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef mat-sort-header> Name </mat-header-cell>
      <mat-cell *matCellDef="let proj"> {{ proj.name }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="clientName">
      <mat-header-cell *matHeaderCellDef> Client </mat-header-cell>
      <mat-cell *matCellDef="let proj"> {{ proj.clientName }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef mat-sort-header> Status </mat-header-cell>
      <mat-cell *matCellDef="let proj">
        <span class="status-chip" [ngClass]="getStatusClass(proj.status)">{{ proj.status }}</span>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="startDate">
      <mat-header-cell *matHeaderCellDef mat-sort-header> Start </mat-header-cell>
      <mat-cell *matCellDef="let proj"> {{ proj.startDate | date:'shortDate' }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="endDate">
      <mat-header-cell *matHeaderCellDef> End </mat-header-cell>
      <mat-cell *matCellDef="let proj"> {{ proj.endDate ? (proj.endDate | date:'shortDate') : '-' }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
      <mat-cell *matCellDef="let proj">
        <button mat-icon-button color="primary" [routerLink]="['/projects', proj.projectId, 'edit']" matTooltip="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button [routerLink]="['/projects', proj.projectId]" matTooltip="View">
          <mat-icon>visibility</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
  </mat-table>

  <mat-paginator [length]="totalCount" [pageSize]="10" [pageSizeOptions]="[5, 10, 25, 50]" (page)="loadProjects()" showFirstLastButtons></mat-paginator>
</div>
