<div class="page-header">
  <h1>My Leaves</h1>
  <button mat-raised-button color="primary" routerLink="/leaves/apply">
    <mat-icon>add</mat-icon> Apply Leave
  </button>
</div>

<mat-card class="table-container mat-elevation-z1">
  <mat-table [dataSource]="leaves">
    <ng-container matColumnDef="fromDate">
      <mat-header-cell *matHeaderCellDef> From </mat-header-cell>
      <mat-cell *matCellDef="let l"> {{ l.fromDate | date:'mediumDate' }} </mat-cell>
    </ng-container>
    <ng-container matColumnDef="toDate">
      <mat-header-cell *matHeaderCellDef> To </mat-header-cell>
      <mat-cell *matCellDef="let l"> {{ l.toDate | date:'mediumDate' }} </mat-cell>
    </ng-container>
    <ng-container matColumnDef="leaveType">
      <mat-header-cell *matHeaderCellDef> Type </mat-header-cell>
      <mat-cell *matCellDef="let l"> {{ l.leaveType }} </mat-cell>
    </ng-container>
    <ng-container matColumnDef="reason">
      <mat-header-cell *matHeaderCellDef> Reason </mat-header-cell>
      <mat-cell *matCellDef="let l"> {{ l.reason }} </mat-cell>
    </ng-container>
    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef> Status </mat-header-cell>
      <mat-cell *matCellDef="let l">
        <mat-chip [color]="getStatusColor(l.status)" highlighted>{{ l.status }}</mat-chip>
      </mat-cell>
    </ng-container>
    <ng-container matColumnDef="appliedAt">
      <mat-header-cell *matHeaderCellDef> Applied </mat-header-cell>
      <mat-cell *matCellDef="let l"> {{ l.appliedAt | date:'short' }} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef> </mat-header-cell>
      <mat-cell *matCellDef="let l">
        <button mat-icon-button color="warn" *ngIf="l.status === 'Pending'" (click)="onCancel(l)" matTooltip="Cancel Leave">
          <mat-icon>cancel</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
  </mat-table>
</mat-card>
