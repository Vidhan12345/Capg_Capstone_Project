<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEditMode ? 'Edit Client' : 'Add Client' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Client Name *</mat-label>
          <input matInput formControlName="clientName">
          <mat-error>Required</mat-error>
        </mat-form-field>
        <div class="form-row">
          <mat-form-field appearance="outline" class="flex-1">
            <mat-label>Location</mat-label>
            <input matInput formControlName="clientLocation">
          </mat-form-field>
          <mat-form-field appearance="outline" class="flex-1">
            <mat-label>Phone</mat-label>
            <input matInput formControlName="clientPhoneNumber">
          </mat-form-field>
        </div>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Address</mat-label>
          <textarea matInput formControlName="clientAddress" rows="2"></textarea>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Status</mat-label>
          <mat-select formControlName="status">
            <mat-option [value]="true">Active</mat-option>
            <mat-option [value]="false">Inactive</mat-option>
          </mat-select>
        </mat-form-field>
        <div class="form-actions">
          <button mat-button type="button" routerLink="/clients">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading">
            {{ isEditMode ? 'Update' : 'Create' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
