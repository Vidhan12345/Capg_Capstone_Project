<div class="page-header">
  <h1>Clients</h1>
  <button mat-raised-button color="primary" routerLink="/clients/new">
    <mat-icon>add</mat-icon> Add Client
  </button>
</div>

<div class="table-container mat-elevation-z1">
  <mat-table [dataSource]="clients">
    <ng-container matColumnDef="clientName">
      <mat-header-cell *matHeaderCellDef> Name </mat-header-cell>
      <mat-cell *matCellDef="let c"> {{ c.clientName }} </mat-cell>
    </ng-container>
    <ng-container matColumnDef="clientLocation">
      <mat-header-cell *matHeaderCellDef> Location </mat-header-cell>
      <mat-cell *matCellDef="let c"> {{ c.clientLocation || '-' }} </mat-cell>
    </ng-container>
    <ng-container matColumnDef="clientPhoneNumber">
      <mat-header-cell *matHeaderCellDef> Phone </mat-header-cell>
      <mat-cell *matCellDef="let c"> {{ c.clientPhoneNumber || '-' }} </mat-cell>
    </ng-container>
    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef> Status </mat-header-cell>
      <mat-cell *matCellDef="let c">
        <mat-chip [color]="c.status ? 'primary' : 'warn'" highlighted>{{ c.status ? 'Active' : 'Inactive' }}</mat-chip>
      </mat-cell>
    </ng-container>
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
      <mat-cell *matCellDef="let c">
        <button mat-icon-button color="primary" [routerLink]="['/clients', c.clientId, 'edit']" matTooltip="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="onDelete(c.clientId, c.clientName)" matTooltip="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>
    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
  </mat-table>
</div>
